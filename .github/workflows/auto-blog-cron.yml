name: Generate Weekly Blog

on:
  schedule:
    # Runs every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic for the blog post (optional - leave empty for auto-selection)'
        required: false
        default: ''
      action:
        description: 'Action to perform'
        required: false
        default: 'generate'
        type: choice
        options:
          - generate
          - seed-static

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Seed static blog posts (one-time setup)
        if: ${{ github.event.inputs.action == 'seed-static' || github.event_name == 'schedule' }}
        run: |
          echo "Seeding static blog posts..."
          response=$(curl -s -w "\n%{http_code}" -X GET \
            "https://maplyo.com/api/admin/seed-blog?secret=${{ secrets.ADMIN_SECRET_KEY }}" \
            -H "Content-Type: application/json")

          body=$(echo "$response" | head -n -1)
          status_code=$(echo "$response" | tail -n 1)

          echo "Seed Status: $status_code"
          echo "Seed Response: $body"

      - name: Select rotating topic
        if: ${{ github.event.inputs.action != 'seed-static' }}
        id: topic
        run: |
          PROVIDED="${{ github.event.inputs.topic }}"
          if [ -n "$PROVIDED" ]; then
            echo "topic=$PROVIDED" >> $GITHUB_OUTPUT
          else
            WEEK=$(date +%V)
            TOPICS=(
              "Comment photographier son logement Airbnb pour maximiser les reservations"
              "Tarification dynamique Airbnb strategies pour optimiser ses revenus selon la saison"
              "Accueil des voyageurs avec animaux de compagnie bonnes pratiques pour hotes Airbnb"
              "Comment repondre aux avis negatifs sur Airbnb et transformer les critiques"
              "Location meublee courte duree obligations legales et fiscalite pour hotes en France"
              "Decoration interieure low-cost pour Airbnb les tendances qui font la difference"
              "Gestion des check-outs Airbnb instructions claires pour eviter les litiges"
              "Comment devenir Superhost Airbnb en 90 jours le plan action complet"
            )
            INDEX=$((WEEK % ${#TOPICS[@]}))
            echo "topic=${TOPICS[$INDEX]}" >> $GITHUB_OUTPUT
          fi

      - name: Generate AI blog post
        if: ${{ github.event.inputs.action != 'seed-static' }}
        run: |
          TOPIC="${{ steps.topic.outputs.topic }}"
          echo "Generating blog post for topic: $TOPIC"

          PAYLOAD=$(printf '{"topic": "%s"}' "$TOPIC")

          response=$(curl -s -w "\n%{http_code}" -X POST https://maplyo.com/api/admin/generate-blog \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            --max-time 90)

          body=$(echo "$response" | head -n -1)
          status_code=$(echo "$response" | tail -n 1)

          echo "Status Code: $status_code"
          echo "Response Body: $body"

          if [ "$status_code" -ne 200 ]; then
            echo "::error::Failed to generate blog post (HTTP $status_code)"
            echo "::error::Response: $body"
            exit 1
          fi

          echo "Blog post generated successfully!"
          echo "$body" | jq -r '"Slug: \(.post.slug // "N/A")"' 2>/dev/null || echo "Done."
